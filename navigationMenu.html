<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Menu Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <!-- Logo/Brand -->
            <div class="nav-logo">
                <a href="#home">MyBrand</a>
            </div>
            
            <!-- Navigation Links -->
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#home" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="#about" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="#services" class="nav-link">Services</a>
                </li>
                <li class="nav-item">
                    <a href="#contact" class="nav-link">Contact</a>
                </li>
            </ul>
            
            <!-- Mobile Menu Toggle -->
            <div class="nav-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>
    
    <!-- Demo content -->
    <main>
        <section id="home" style="height: 100vh; background: #f0f0f0; display: flex; align-items: center; justify-content: center;">
            <h1>Home Section</h1>
        </section>
        <section id="about" style="height: 100vh; background: #e0e0e0; display: flex; align-items: center; justify-content: center;">
            <h1>About Section</h1>
        </section>
        <section id="services" style="height: 100vh; background: #d0d0d0; display: flex; align-items: center; justify-content: center;">
            <h1>Services Section</h1>
        </section>
        <section id="contact" style="height: 100vh; background: #c0c0c0; display: flex; align-items: center; justify-content: center;">
            <h1>Contact Section</h1>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
